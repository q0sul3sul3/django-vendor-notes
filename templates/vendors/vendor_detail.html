{% extends 'base.html' %}

{% block content %}
<h1>{{ vendor.name }}</h1>
<p>Email: {{ vendor.contact_email }}</p>
<p>Phone: {{ vendor.phone }}</p>
<a href="{% url 'vendor_edit' vendor.pk %}?next=detail" class="btn btn-secondary">Edit Vendor</a>
<a href="{% url 'note_create' vendor.pk %}" class="btn btn-primary">Add Note</a>

<div class="mt-4">
<h2>Notes</h2>
{% for note in notes %}
<div class="card mb-3">
    <div class="card-body">
        <h5 class="card-title">{{ note.title }}</h5>
        <p class="card-text">{{ note.content }}</p>
        <small class="text-muted">{{ note.date }}</small>
        <a href="{% url 'note_edit' note.pk %}" class="btn btn-secondary btn-sm">Edit</a>
        <a href="{% url 'note_delete' note.pk %}" class="btn btn-danger btn-sm">Delete</a>
    </div>
</div>
{% endfor %}
{% endblock %}
