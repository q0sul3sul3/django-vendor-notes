{% extends 'base.html' %}

{% block content %}
<h1>{% if vendor %}Edit{% else %}Add{% endif %} Vendor</h1>
{% if error_message %}
<div class="alert alert-danger">{{ error_message }}</div>
{% endif %}
<form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name" value="{{ vendor.name }}" class="form-control" required>
    </div>
    <div class="form-group">
        <label>Contact Email:</label>
        <input type="email" name="contact_email" value="{{ vendor.contact_email }}" class="form-control" required>
    </div>
    <div class="form-group">
        <label>Phone:</label>
        <input type="text" name="phone" value="{{ vendor.phone }}" class="form-control" required>
        <small class="form-text text-muted">Only numbers and symbols (-, (, ), +) are allowed.</small>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    {% if vendor.pk %}
    <a href="{% url 'vendor_detail' vendor.pk %}" class="btn btn-secondary">Cancel</a>
    {% else %}
    <a href="{% url 'vendor_list' %}" class="btn btn-secondary">Cancel</a>
    {% endif %}
</form>
{% endblock %}
