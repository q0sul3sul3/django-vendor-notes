{% extends 'base.html' %}

{% block content %}
<h1>{% if note %}Edit{% else %}Add{% endif %} Note</h1>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label>Title:</label>
        <input type="text" name="title" value="{{ note.title }}" class="form-control" required>
    </div>
    <div class="form-group">
        <label>Content:</label>
        <textarea name="content" class="form-control" required>{{ note.content }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    {% if note %}
    <a href="{% url 'vendor_detail' note.vendor.pk %}" class="btn btn-secondary">Cancel</a>
    {% else %}
    <a href="{% url 'vendor_detail' vendor.pk %}" class="btn btn-secondary">Cancel</a>
    {% endif %}
</form>
{% endblock %}
