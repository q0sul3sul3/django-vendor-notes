{% extends 'base.html' %}

{% block content %}
<h1>Delete Vendor</h1>
<p>Are you sure you want to delete "{{ vendor.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'vendor_detail' vendor.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
